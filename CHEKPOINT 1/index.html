<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Grid Exercise</title>

  <link rel="stylesheet" href="css-styles.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

</head>

<body>

  <!-- GRID 1 -->
  <div class="gridOne">
        <div class="hellowordOne">

            <p>Hello World</p>
        </div>
        <div class="contentOne">
            <p>My Fantastic Content</p>
        </div>

  </div>

  <!-- GRID 2 -->
  <div class="gridTwo">

    <div class="boxOne">
      <p>whatever</p>
    </div>

    <div class="boxTwo">
      <p>text</p>
    </div>

    <div class="boxThree">
      <p>I want</p>
    </div>

  </div>

  <!-- GRID 3 -->
  <div class="gridThree">

    <div class="textThree">
      <p>The text I chose is awesome</p>
    </div>

    <div class="imageThree">
      <img src="https://picsum.photos/500/225">
    </div>

  </div>

  <!-- GRID 4 -->
  <div class="gridFour">

    <div class="textFour">
      <p>My even more awesome text</p>
    </div>

    <div id="nestedGrid">
      <p>My left text</p>
      <p>My right text</p>
    </div>

  </div>

  <!-- GRID 5 -->
  <div class="gridFive">

    <div class="textFive">
      <p>My even more awesome text</p>
    </div>

    <div class="imageGrid">
      <img src="https://picsum.photos/400/400">
      <img src="https://picsum.photos/401/401">
    </div>

  </div>

  <!-- GRID 6 -->
  <div class="gridSix">

    <i class="fas fa-heart"></i>

    <p>This paragraph uses a Google Font</p>

  </div>

</body>

</html>
