<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flexbox Exercises Corrected</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
      background-color: #f9f9f9;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 50px;
    }

    /* General square style */
    .square {
      background-color: cadetblue;
    }

    .item {
      background-color: #0b6643;
      width: 50px;
      height: 50px;
    }

    /* FlexOne */
    .flexOne {
      display: flex;
    }
    .flexOne .square {
      width: 100px;
      height: 100px;
      margin: 5px;
    }

    /* FlexTwo */
    .flexTwo {
      display: flex;
      flex-direction: column;
    }
    .flexTwo .square {
      width: 100px;
      height: 100px;
      margin: 2px;
    }

    /* FlexThree */
    .flexThree {
      display: flex;
      flex-direction: row-reverse;
    }
    .flexThree .square {
      width: 100px;
      height: 100px;
      margin: 5px;
    }

    /* FlexFour */
    .flexFour {
      display: flex;
      width: 350px;
      flex-flow: wrap;
    }
    .flexFour .square {
      width: 100px;
      height: 100px;
      background-color: #3d8b6d;
      margin: 5px;
    }

    /* FlexFive */
    .flexFive {
      display: flex;
      width: 350px;
    }
    .flexFive .item {
      width: 100px;
      height: 100px;
      margin: 2px;
      background-color: #0b6643;
    }
    #grow {
      flex-grow: 2;
    }

    /* FlexSix */
    .flexSix {
      display: flex;
      flex-direction: column;
      width: 300px;
      height: 250px;
      background-color: #f1f1f1;
    }
    .flexSix .one {
      display: flex;
      justify-content: space-around;
    }
    .flexSix .two {
      display: flex;
      justify-content: space-between;
      margin: 50px 0;
      background-color: #d6d6d6;
    }
    .flexSix .three {
      display: flex;
      justify-content: space-evenly;
    }

    /* FlexSeven */
    .flexSeven {
      display: flex;
      width: 300px;
      height: 250px;
      background-color: #f1f1f1;
      justify-content: space-between;
    }
    .flexSeven > div {
      display: flex;
      flex-direction: column;
    }
    .flexSeven .one {
      justify-content: center;
    }
    .flexSeven .two {
      background-color: #d6d6d6;
      justify-content: flex-end;
    }
    .flexSeven .three {
      justify-content: flex-start;
    }
    .flexSeven .four {
      background-color: #d6d6d6;
      justify-content: space-between;
    }

    /* FlexEight */
    .flexEight {
      display: flex;
      width: 250px;
      height: 250px;
      background-color: #eeeeee;
    }
    .flexEight > div {
      display: flex;
      width: 50px;
    }
    .flexEight .one {
      align-items: center;
    }
    .flexEight .two {
      align-items: flex-end;
    }
    .flexEight .three {
      align-items: flex-start;
    }

    /* FlexNine */
    .flexNine {
      display: flex;
      width: 350px;
      height: 250px;
      background-color: #eeeeee;
      justify-content: space-evenly;
      align-items: flex-start;
    }
    #special {
      align-self: flex-end;
    }

  </style>
</head>
<body>

  <!-- Flexbox 1 -->
  <div class="container">
    <div class="flexOne">
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
    </div>
  </div>

  <!-- Flexbox 2 -->
  <div class="container">
    <div class="flexTwo">
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
    </div>
  </div>

  <!-- Flexbox 3 -->
  <div class="container">
    <div class="flexThree">
      <div class="square">1</div>
      <div class="square">2</div>
      <div class="square">3</div>
    </div>
  </div>

  <!-- Flexbox 4 -->
  <div class="container">
    <div class="flexFour">
      <div class="square">1</div>
      <div class="square">2</div>
      <div class="square">3</div>
      <div class="square">4</div>
    </div>
  </div>

  <!-- Flexbox 5 -->
  <div class="container">
    <div class="flexFive">
      <div class="item">1</div>
      <div class="item" id="grow">2</div>
      <div class="item">3</div>
    </div>
  </div>

  <!-- Flexbox 6 -->
  <div class="container">
    <div class="flexSix">
      <div class="one">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
      <div class="two">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
      <div class="three">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
    </div>
  </div>

  <!-- Flexbox 7 -->
  <div class="container">
    <div class="flexSeven">
      <div class="one">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
      <div class="two">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
      <div class="three">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
      <div class="four">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
    </div>
  </div>

  <!-- Flexbox 8 -->
  <div class="container">
    <div class="flexEight">
      <div class="one">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
      <div class="two">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
      <div class="three">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
    </div>
  </div>

  <!-- Flexbox 9 -->
  <div class="container">
    <div class="flexNine">
      <div class="item"></div>
      <div class="item" id="special"></div>
      <div class="item"></div>
    </div>
  </div>

</body>
</html>
