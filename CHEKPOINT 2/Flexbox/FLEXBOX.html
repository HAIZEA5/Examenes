<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flexbox Exercises</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
      background-color: #f9f9f9;
    }

    section {
      margin-bottom: 50px;
      padding: 20px;
      background-color: #fff;
      border: 1px solid #ddd;
    }

    h2 {
      margin-top: 0;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
    }

    /* General square style */
    .square {
      background-color: cadetblue;
      width: 200px;
      height: 200px;
    }

    .item {
      background-color: #0b6643;
      width: 50px;
      height: 50px;
    }

    /* FlexOne */
    .flexOne {
      display: flex;
    }
    .flexOne .square {
      margin: 5px;
    }

    /* FlexTwo */
    .flexTwo {
      display: flex;
      flex-direction: column;
    }
    .flexTwo .square {
      margin: 2px;
    }

    /* FlexThree */
    .flexThree {
      display: flex;
      flex-direction: row-reverse;
    }
    .flexThree .square {
      margin: 5px;
    }

    /* FlexFour */
    .flexFour {
      display: flex;
      width: 350px;
      flex-flow: wrap;
    }
    .flexFour .square {
      width: 100px;
      height: 100px;
      background-color: #3d8b6d;
      margin: 5px;
    }

    /* FlexFive */
    .flexFive {
      display: flex;
      width: 350px;
    }
    .flexFive .item {
      width: 100px;
      height: 100px;
      margin: 2px;
      background-color: #0b6643;
    }
    #grow {
      flex-grow: 2;
    }

    /* FlexSix */
    .flexSix {
      display: flex;
      flex-direction: column;
      height: 250px;
      width: 400px;
      background-color: #f1f1f1;
    }
    .flexSix .one {
      display: flex;
      justify-content: space-around;
    }
    .flexSix .two {
      display: flex;
      justify-content: space-between;
      margin: 50px 0;
      background-color: #d6d6d6;
    }
    .flexSix .three {
      display: flex;
      justify-content: space-evenly;
    }

    /* FlexSeven */
    .flexSeven {
      display: flex;
      width: 500px;
      height: 400px;
      background-color: #f1f1f1;
      justify-content: space-between;
    }
    .flexSeven > div {
      display: flex;
      flex-direction: column;
    }
    .flexSeven .one {
      justify-content: center;
    }
    .flexSeven .two {
      justify-content: flex-end;
    }
    .flexSeven .three {
      justify-content: flex-start;
    }
    .flexSeven .four {
      justify-content: space-between;
    }

    /* FlexEight */
    .flexEight {
      display: flex;
      width: 300px;
      height: 400px;
      background-color: #eeeeee;
    }
    .flexEight > div {
      display: flex;
      width: 100px;
    }
    .flexEight .one {
      align-items: center;
    }
    .flexEight .two {
      align-items: flex-end;
    }
    .flexEight .three {
      align-items: flex-start;
    }

    /* FlexNine */
    .flexNine {
      display: flex;
      width: 250px;
      height: 200px;
      background-color: #eeeeee;
      justify-content: space-evenly;
      align-items: flex-start;
    }
    #special {
      align-self: flex-end;
    }

  </style>
</head>
<body>

  <section>
    <h2>Flex One</h2>
    <div class="container">
      <div class="flexOne">
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
      </div>
    </div>
  </section>

  <section>
    <h2>Flex Two</h2>
    <div class="container">
      <div class="flexTwo">
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
      </div>
    </div>
  </section>

  <section>
    <h2>Flex Three</h2>
    <div class="container">
      <div class="flexThree">
        <div class="square">1</div>
        <div class="square">2</div>
        <div class="square">3</div>
      </div>
    </div>
  </section>

  <section>
    <h2>Flex Four</h2>
    <div class="container">
      <div class="flexFour">
        <div class="square">1</div>
        <div class="square">2</div>
        <div class="square">3</div>
        <div class="square">4</div>
      </div>
    </div>
  </section>

  <section>
    <h2>Flex Five</h2>
    <div class="container">
      <div class="flexFive">
        <div class="item">1</div>
        <div class="item" id="grow">2</div>
        <div class="item">3</div>
      </div>
    </div>
  </section>

  <section>
    <h2>Flex Six</h2>
    <div class="container">
      <div class="flexSix">
        <div class="one">
          <div class="item"></div>
          <div class="item"></div>
          <div class="item"></div>
        </div>
        <div class="two">
          <div class="item"></div>
          <div class="item"></div>
          <div class="item"></div>
        </div>
        <div class="three">
          <div class="item"></div>
          <div class="item"></div>
          <div class="item"></div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <h2>Flex Seven</h2>
    <div class="container">
      <div class="flexSeven">
        <div class="one">
          <div class="item"></div>
          <div class="item"></div>
          <div class="item"></div>
        </div>
        <div class="two">
          <div class="item"></div>
          <div class="item"></div>
          <div class="item"></div>
        </div>
        <div class="three">
          <div class="item"></div>
          <div class="item"></div>
          <div class="item"></div>
        </div>
        <div class="four">
          <div class="item"></div>
          <div class="item"></div>
          <div class="item"></div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <h2>Flex Eight</h2>
    <div class="container">
      <div class="flexEight">
        <div class="one">
          <div class="item"></div>
          <div class="item"></div>
          <div class="item"></div>
        </div>
        <div class="two">
          <div class="item"></div>
          <div class="item"></div>
          <div class="item"></div>
        </div>
        <div class="three">
          <div class="item"></div>
          <div class="item"></div>
          <div class="item"></div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <h2>Flex Nine</h2>
    <div class="container">
      <div class="flexNine">
        <div class="item"></div>
        <div class="item" id="special"></div>
        <div class="item"></div>
      </div>
    </div>
  </section>

</body>
</html>
