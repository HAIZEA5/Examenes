<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title></title>
  <style>
    body {
      margin: 0;
      padding: 0;
    }

    .container {
      display: flex;
    
     
    }

    .flexFive {
      display: flex;
      width: 350px;
    }

    .item {
      background-color: #0b6643;
      width: 100px;
      height: 100px;
    }
    
    .flexFive .item {
      margin: 2px;
    }

    #grow {
      flex-grow: 2;
    }

  </style>
</head>

<body>
  <div class="container">

    <div class="flexFive">
      <div class="item">1</div>
      <div class="item" id="grow">2</div>
      <div class="item">3</div>
    </div>

  </div>
</body>
</html>
